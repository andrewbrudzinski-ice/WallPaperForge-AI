<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>WallpaperForge AI — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #f5f5fa;
        background: #08080f;
        background-image:
          radial-gradient(60% 50% at 20% 0%, rgba(124, 92, 255, 0.25), transparent 70%),
          radial-gradient(50% 50% at 100% 10%, rgba(56, 189, 248, 0.18), transparent 60%),
          radial-gradient(60% 60% at 50% 100%, rgba(236, 72, 153, 0.14), transparent 70%);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        padding: 32px 24px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
      }
      .orb {
        width: 72px; height: 72px; margin: 0 auto 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #fff, #7c5cff 60%, #38bdf8);
        box-shadow: 0 10px 40px rgba(124, 92, 255, 0.5);
      }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: rgba(245, 245, 250, 0.6); font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
      button {
        font: inherit; font-weight: 600; color: #fff; cursor: pointer;
        border: none; border-radius: 16px; padding: 12px 22px;
        background: linear-gradient(135deg, #7c5cff, #38bdf8);
      }
      .hint { margin-top: 16px; font-size: 12px; color: rgba(245,245,250,0.4); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="orb"></div>
      <h1>You're offline</h1>
      <p>WallpaperForge needs a connection to forge new wallpapers. Your saved
        wallpapers and favorites are still available once you're back online.</p>
      <button onclick="location.reload()">Try again</button>
      <div class="hint">Your library is stored on this device.</div>
    </div>
  </body>
</html>
